<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI LMS</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@100..900&family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              error: "#ba1a1a",
              "surface-container-high": "#dce9ff",
              secondary: "#565e74",
              "on-error-container": "#93000a",
              background: "#f8f9ff",
              "primary-container": "#4f46e5",
              "inverse-primary": "#c3c0ff",
              "surface-container-highest": "#d3e4fe",
              "tertiary-fixed-dim": "#c4c7c9",
              "on-tertiary": "#ffffff",
              primary: "#3525cd",
              "surface-dim": "#cbdbf5",
              "secondary-fixed-dim": "#bec6e0",
              "on-secondary-container": "#5c647a",
              "inverse-on-surface": "#eaf1ff",
              "on-secondary-fixed": "#131b2e",
              "tertiary-container": "#5e6163",
              "on-surface-variant": "#464555",
              "on-secondary": "#ffffff",
              "on-error": "#ffffff",
              "outline-variant": "#c7c4d8",
              "on-secondary-fixed-variant": "#3f465c",
              "on-primary-container": "#dad7ff",
              "on-tertiary-fixed": "#191c1e",
              "surface-container": "#e5eeff",
              "on-surface": "#0b1c30",
              "on-tertiary-container": "#dadcde",
              "primary-fixed": "#e2dfff",
              "on-tertiary-fixed-variant": "#444749",
              surface: "#f8f9ff",
              "secondary-fixed": "#dae2fd",
              "tertiary-fixed": "#e0e3e5",
              "surface-container-low": "#eff4ff",
              "surface-bright": "#f8f9ff",
              "inverse-surface": "#213145",
              "on-primary": "#ffffff",
              outline: "#777587",
              "primary-fixed-dim": "#c3c0ff",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            spacing: {
              unit: "4px",
              "margin-desktop": "32px",
              "margin-mobile": "16px",
              "max-content-width": "1280px",
              gutter: "24px",
            },
            fontFamily: {
              "headline-lg-mobile": ["Hanken Grotesk"],
              "body-lg": ["Inter"],
              "body-md": ["Inter"],
              "headline-md": ["Hanken Grotesk"],
              "headline-lg": ["Hanken Grotesk"],
              "body-sm": ["Inter"],
              "label-md": ["Inter"],
              "code-sm": ["JetBrains Mono"],
              "display-lg": ["Hanken Grotesk"],
            },
            fontSize: {
              "headline-lg-mobile": [
                "24px",
                { lineHeight: "32px", fontWeight: "600" },
              ],
              "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
              "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
              "headline-md": [
                "24px",
                { lineHeight: "32px", fontWeight: "600" },
              ],
              "headline-lg": [
                "32px",
                {
                  lineHeight: "40px",
                  letterSpacing: "-0.01em",
                  fontWeight: "600",
                },
              ],
              "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
              "label-md": ["14px", { lineHeight: "20px", fontWeight: "500" }],
              "code-sm": ["13px", { lineHeight: "18px", fontWeight: "400" }],
              "display-lg": [
                "48px",
                {
                  lineHeight: "56px",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #f8f9ff;
        color: #0b1c30;
        overflow-x: hidden;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #c7c4d8;
        border-radius: 10px;
      }
      .ai-glow {
        position: relative;
      }
      .ai-glow::after {
        content: "";
        position: absolute;
        inset: -2px;
        background: linear-gradient(45deg, #3525cd, #4f46e5, #c3c0ff);
        z-index: -1;
        filter: blur(8px);
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .ai-glow:hover::after {
        opacity: 0.4;
      }
    </style>
  </head>
  <body
    class="font-body-md text-body-md selection:bg-primary-container selection:text-on-primary-container"
  >
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const buttons = document.querySelectorAll("button");
        buttons.forEach((btn) => {
          btn.addEventListener("mousedown", () => {
            btn.classList.add("scale-95");
          });
          btn.addEventListener("mouseup", () => {
            btn.classList.remove("scale-95");
          });
          btn.addEventListener("mouseleave", () => {
            btn.classList.remove("scale-95");
          });
        });
      });
    </script>
  </body>
</html>
